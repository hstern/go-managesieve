name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"; echo "$out"; exit 1
          fi
      - name: go build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: go test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  # Required check: exercises the client against a real Dovecot Pigeonhole
  # server so the wire protocol stays verified against the reference
  # implementation on every change.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Start Dovecot Pigeonhole
        run: |
          docker run -d --name dovecot -p 127.0.0.1:4190:4190 \
            -v "$PWD/testdata/dovecot.conf:/etc/dovecot/dovecot.conf:ro" \
            dovecot/dovecot:2.3-latest
          for i in $(seq 1 30); do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/4190' 2>/dev/null; then
              echo "ManageSieve is ready"; exit 0
            fi
            sleep 1
          done
          echo "Dovecot did not become ready"; docker logs dovecot; exit 1
      - name: Run integration test
        env:
          MANAGESIEVE_ADDR: 127.0.0.1:4190
          MANAGESIEVE_USER: testuser
          MANAGESIEVE_PASS: testpass
          MANAGESIEVE_TLS: none
        run: go test -tags managesieve_integration -v ./...
      - name: Dovecot logs on failure
        if: failure()
        run: docker logs dovecot
