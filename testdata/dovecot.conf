# Minimal Dovecot configuration for the go-managesieve integration test.
# Stands up ManageSieve (Pigeonhole) on port 4190 with PLAIN auth over
# cleartext (no TLS) and a static credential: any username + "testpass".
# For test use only — never a production configuration.
#
# Requires Dovecot 2.3 syntax (the 2.4 image uses an incompatible format).
#   docker run -d -p 127.0.0.1:4190:4190 \
#     -v "$PWD/testdata/dovecot.conf:/etc/dovecot/dovecot.conf:ro" \
#     dovecot/dovecot:2.3-latest

log_path = /dev/stderr
protocols = sieve
ssl = no
disable_plaintext_auth = no
auth_mechanisms = plain

mail_home = /tmp/vmail/%Lu
mail_location = maildir:~/Mail
first_valid_uid = 1000
mail_uid = 1000
mail_gid = 1000

passdb {
  driver = static
  args = password=testpass
}
userdb {
  driver = static
  args = uid=1000 gid=1000 home=/tmp/vmail/%Lu
}

service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

plugin {
  sieve = file:~/sieve;active=~/.dovecot.sieve
}
